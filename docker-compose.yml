services:
  postgres:
    image: postgres:16-alpine
    container_name: docuia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: docuia
      POSTGRES_USER: docuia_user
      POSTGRES_PASSWORD: docuia_local_pass
    ports:
      - "5432:5432"
    volumes:
      - docuia_postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: docuia-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - docuia_minio_data:/data

volumes:
  docuia_postgres_data:
  docuia_minio_data:
